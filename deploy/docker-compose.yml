# Front seulement — sur le VPS : dossier front/
#   docker login ghcr.io  # si images privées
#   docker compose pull && docker compose up -d

services:
  web:
    image: ghcr.io/mathiascoutant/neurorun-front:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:9080:80"
    networks: [neurorun]

networks:
  neurorun:
