name: CI

on:
  push:
  pull_request:

env:
  REGISTRY: ghcr.io
  PUSH_IMAGE: ${{ github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') }}

jobs:
  build-and-docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install et build (vérification)
        working-directory: frontend
        run: npm install && npm run build

      - name: Lire la version (version.yml)
        id: ver
        run: |
          v=$(sed -n 's/^version:[[:space:]]*//p' version.yml | head -1 | tr -d '"' | tr -d "'" | tr -d ' ')
          if [ -z "$v" ]; then echo "::error::version.yml: clé « version » introuvable"; exit 1; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Nom d’image (minuscules)
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Connexion à GHCR
        if: env.PUSH_IMAGE == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (et push si push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ env.PUSH_IMAGE == 'true' }}
          build-args: |
            APP_VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:latest
